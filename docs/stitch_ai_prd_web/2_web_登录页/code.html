</div>
</div>

<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">密码</label>
<a class="text-xs font-semibold text-primary hover:underline decoration-2 underline-offset-4" href="#">忘记密码？</a>

<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>

                        登录 / 注册

<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="text-xs font-bold text-outline uppercase tracking-widest">或通过以下方式</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
