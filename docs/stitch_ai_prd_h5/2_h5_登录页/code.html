<body class="bg-background font-body text-on-background min-h-screen flex flex-col dreamy-bg">
<!-- Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-background mb-2">StoryCanvas AI</h1>
<p class="text-on-surface-variant font-medium">绘梦画布，开启您的AI创作之旅</p>
</div>
<!-- Auth Card -->
<div class="w-full max-w-sm glass-panel rounded-xl p-8 shadow-[0_32px_64px_rgba(88,71,210,0.06)] border border-white/40">

<div class="flex p-1 bg-surface-container rounded-full mb-8">
<button class="flex-1 py-2 text-sm font-semibold rounded-full bg-surface-container-lowest text-primary shadow-sm">登录</button>
<button class="flex-1 py-2 text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors">注册</button>
</div>
<!-- Form -->

<div class="space-y-2">
<label class="block text-[10px] font-label font-bold uppercase tracking-widest text-outline ml-4">邮箱地址</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-md py-4 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60" placeholder="example@story.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-4">
<label class="text-[10px] font-label font-bold uppercase tracking-widest text-outline">密码</label>
<a class="text-[10px] font-label font-bold uppercase tracking-widest text-primary hover:opacity-80" href="#">忘记密码?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline/60" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-fixed-dim text-on-primary font-bold rounded-full shadow-[0_8px_24px_rgba(88,71,210,0.25)] active:scale-95 transition-transform duration-200 mt-4" type="submit">
                    登录 / 注册
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-[10px] font-label font-bold uppercase tracking-widest">
<span class="bg-white/0 px-4 text-outline">或者通过</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-6 bg-surface-container-lowest border border-outline-variant/20 rounded-full text-on-surface font-semibold hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<div class="w-6 h-6 bg-[#07C160] rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xs" data-icon="chat" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<span>微信登录</span>
</button>
</div>
